<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">PG · NO SLEEP WEDDING CLUB</title>
  <desc id="desc">Premium black and white wedding club identity combining the original PG monogram with NO SLEEP WEDDING CLUB typography.</desc>
  <defs>
    <clipPath id="softCard"><rect x="238" y="168" width="424" height="276" rx="42"/></clipPath>
    <filter id="paper" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.045"/></feComponentTransfer>
      <feBlend mode="multiply" in2="SourceGraphic"/>
    </filter>
  </defs>

  <rect width="900" height="900" rx="120" fill="#f7f7f2"/>
  <rect x="32" y="32" width="836" height="836" rx="96" fill="none" stroke="#050505" stroke-width="18"/>
  <rect x="62" y="62" width="776" height="776" rx="76" fill="none" stroke="#050505" stroke-width="2" stroke-dasharray="24 18" opacity="0.62"/>

  <g filter="url(#paper)">
    <rect x="108" y="104" width="684" height="692" rx="56" fill="#ffffff" stroke="#050505" stroke-width="3"/>
    <rect x="132" y="128" width="636" height="644" rx="40" fill="none" stroke="#050505" stroke-width="1.5" opacity="0.45"/>
  </g>

  <g>
    <text x="450" y="118" text-anchor="middle" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="24" letter-spacing="12" fill="#050505">PRIVATE WEDDING CLUB</text>
    <text x="450" y="826" text-anchor="middle" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="20" letter-spacing="9" fill="#050505">FINCA SAN ISIDRO · ARDALES</text>
  </g>

  <g clip-path="url(#softCard)">
    <rect x="238" y="168" width="424" height="276" rx="42" fill="#f7f7f2"/>
    <image href="data:image/jpeg;base64," x="260" y="126" width="380" height="360" preserveAspectRatio="xMidYMid meet" opacity="0.98"/>
  </g>
  <rect x="238" y="168" width="424" height="276" rx="42" fill="none" stroke="#050505" stroke-width="2" opacity="0.16"/>

  <g fill="#050505">
    <text x="450" y="548" text-anchor="middle" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="96" letter-spacing="-3">NO SLEEP</text>
    <text x="450" y="624" text-anchor="middle" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="46" letter-spacing="10">WEDDING CLUB</text>
    <text x="450" y="682" text-anchor="middle" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="19" letter-spacing="5">CATORCE HORAS · UN INVITADO SECRETO · CERO CASA</text>
  </g>

  <g stroke="#050505" stroke-width="3" fill="none" opacity="0.88">
    <path d="M168 510h112"/>
    <path d="M620 510h112"/>
    <path d="M168 650h136"/>
    <path d="M596 650h136"/>
  </g>

  <g fill="#050505">
    <circle cx="170" cy="332" r="8"/>
    <circle cx="730" cy="332" r="8"/>
    <circle cx="170" cy="704" r="8"/>
    <circle cx="730" cy="704" r="8"/>
    <text x="450" y="738" text-anchor="middle" font-family="Arial Black, Impact, Helvetica, sans-serif" font-size="20" letter-spacing="8">06.12.2026</text>
  </g>
</svg>
